name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init .
          git remote add origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags --force origin "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          git checkout --force -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.14.0

      - name: Seed semantic-release baseline
        run: node script/semantic-release/seed-release-history.js --push

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@7
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@martynus.net
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@martynus.net
