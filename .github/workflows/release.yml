name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.14.0

      - name: Bootstrap fresh release history
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
        run: |
          git fetch --tags --force

          if git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -q .; then
            echo "Existing semantic-release tag found; skipping bootstrap."
            exit 0
          fi

          git tag v0.0.0
          git push "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" v0.0.0

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@7
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_TOKEN || github.token }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@martynus.net
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@martynus.net
